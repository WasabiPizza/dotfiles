env:
  TERM: alacritty
  
window:
  dimensions:
    columns: 90
    lines: 27 

  padding:
    x: 10
    y: 10 

scrolling:
  history: 10000
  multiplier: 3

font:
  normal:
    family: Iosevka Term
    style: Regular

#  bold:
#    family: Iosevka Term
#    style: Bold

#  italic:
#    family: Iosevka Term
#    style: Italic

  size: 11.0

colors:
  # Default colors
  primary:
    background: '0x121213'
    foreground: '0xfdf9f7'

  # Normal colors
  normal:
    black:   '0x1c1b1d'
    red:     '0xde9dac'
    green:   '0x9ddeaf'
    yellow:  '0xdedd9d'
    blue:    '0x9dacde'
    magenta: '0xaf9dde'
    cyan:    '0x9dccde'
    white:   '0xf4e0d8'

  # Bright colors
  bright:
    black:   '0x262427'
    red:     '0xf7afc0'
    green:   '0xaff7c3'
    yellow:  '0xf7f6af'
    blue:    '0xafc0f7'
    magenta: '0xc3aff7'
    cyan:    '0xafe3f7'
    white:   '0xf9ece8'

background_opacity: 1.0

cursor:
  style: Block
  unfocused_hollow: true

live_config_reload: true

key_bindings:
  - { key: V,        mods: Control, action: Paste                            }
  - { key: C,        mods: Control, action: Copy                             }
  - { key: Return,   mods: Control|Shift, action: SpawnNewInstance           }
